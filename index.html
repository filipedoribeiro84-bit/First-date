<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>First Date Premium</title>
    <style>
        :root { --primary: #ff4b2b; --bg: #050505; }
        * { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { font-family: sans-serif; background: radial-gradient(circle at top, #1a0b0b, #050505); color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .premium-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 30px; padding: 40px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h1 { font-size: 32px; margin: 0; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 14px; color: #888; margin: 15px 0 30px; }
        select { width: 100%; padding: 15px; border-radius: 15px; background: #111; color: #fff; border: 1px solid #333; font-size: 16px; margin-bottom: 25px; outline: none; }
        .btn-premium { background: linear-gradient(45deg, #ff4b2b, #ff416c); color: #fff; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 16px; box-shadow: 0 10px 20px rgba(255, 75, 43, 0.3); transition: 0.2s; }
        .btn-premium:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="premium-card">
        <h1>First Date</h1>
        <p>Premium Global Translation</p>
        <select id="myLang">
            <option value="pt">Português (Brasil)</option>
            <option value="en">English (USA)</option>
            <option value="es">Español</option>
        </select>
        <button class="btn-premium" onclick="startCall()">🎥 START LIVE</button>
    </div>

    <script>
        function startCall() {
            const lang = document.getElementById('myLang').value;
            const roomId = "FirstDate_" + Math.random().toString(36).substring(7);
            const config = `#config.startWithAudioMuted=false&config.defaultLanguage="${lang}"&config.transcription.enabled=true&config.prejoinPageEnabled=false`;
            
            if (navigator.vibrate) navigator.vibrate(50);
            window.location.href = "https://meet.jit.si/" + roomId + config;
        }
        window.oncontextmenu = function(n) { n.preventDefault(); return false; };
    </script>
</body>
</html>
