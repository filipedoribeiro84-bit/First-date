<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Date - App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; text-align: center; }
        .card { background: white; margin: 20px auto; width: 90%; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 20px; }
        .photo { width: 100%; height: 300px; background: #ddd; border-radius: 10px; object-fit: cover; }
        .btn { background-color: #ff4b2b; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>First Date</h1>
    <div class="card">
        <div class="photo">Foto do Perfil</div>
        <h2>Novo Candidato, 25</h2>
        <p>Santos, SP</p>
        <button class="btn">CONVIDAR PARA ENCONTRO</button>
    </div>
</body>
</html>
