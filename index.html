<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>First Date - Premium Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores da Nova Interface */
            --lilas: #A374F1;
            --azul: #4169E1;
            --bg-start: #E6E6FA; /* Lilás Claro de fundo */
            --bg-end: #F0F8FF;   /* Azul Alice de fundo */
            --card-text: #333333;
            --input-border: #DCDCDC;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
            outline: none;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            /* Gradiente de Fundo Principal (Lilás -> Azul) */
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--card-text); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cartão de Vidro Fosco (Glassmorphism) */
        .premium-card { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; 
            padding: 45px 35px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 60px rgba(100, 100, 100, 0.1);
        }

        .logo-area {
            margin-bottom: 35px;
        }

        h1 { 
            font-size: 36px; 
            font-weight: 700;
            background: linear-gradient(to right, var(--lilas), var(--azul));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -1.5px;
        }

        .badge {
            background: rgba(163, 116, 241, 0.1);
            color: var(--lilas);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            display: inline-block;
        }

        p { font-size: 15px; color: #666; margin: 15px 0 35px; line-height: 1.6; }

        .input-group {
            text-align: left;
            width: 100%;
            margin-bottom: 30px;
        }

        label { 
            font-size: 11px; 
            color: #888; 
            font-weight: 600;
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select { 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            background: #ffffff; 
            color: #333; 
            border: 1px solid var(--input-border); 
            font-size: 16px;
            margin-top: 10px;
            appearance: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s ease;
        }

        select:focus {
            border-color: var(--lilas);
        }

        /* Botão Premium com Gradiente Lilás -> Azul */
        .btn-premium { 
            background: linear-gradient(45deg, var(--lilas), var(--azul));
            color: white; 
            border: none; 
            padding: 22px; 
            border-radius: 22px; 
            width: 100%; 
            font-weight: 700; 
            font-size: 17px; 
            box-shadow: 0 12px 35px rgba(100, 100, 100, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }

        .btn-premium:active { transform: scale(0.96); opacity: 0.95; }

        .footer-text {
            margin-top: 35px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="premium-card">
        <div class="logo-area">
            <h1>First Date</h1>
            <div class="badge">Global Connection</div>
        </div>
        
        <p>Inicie uma chamada de vídeo com tradução simultânea em tempo real.</p>
        
        <div class="input-group">
            <label>Seu Idioma Nativo</label>
            <select id="myLang">
                <option value="pt">Português (Brasil)</option>
                <option value="en">English (USA)</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
            </select>
        </div>

        <button class="btn-premium" onclick="startGlobalCall()">
            <span>🎥</span> COMEÇAR AGORA
        </button>
    </div>
    <div class="footer-text">Secure & Translated Communication</div>
</div>

<script>
    function startGlobalCall() {
        const lang = document.getElementById('myLang').value;
        const roomId = "Premium_Room_" + Math.random().toString(36).substring(7);
        const config = `#config.startWithAudioMuted=false&config.defaultLanguage="${lang}"&config.transcription.enabled=true&config.prejoinPageEnabled=false`;
        
        // Vibração ao clicar (Feedback Háptico Premium)
        if (navigator.vibrate) navigator.vibrate(50);
        
        window.location.href = "https://meet.jit.si/" + roomId + config;
    }

    // Bloqueia menus do navegador e toque longo
    window.oncontextmenu = function(event) {
        event.preventDefault();
        event.stopPropagation();
        return false;
    };
</script>

</body>
</html>
